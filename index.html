<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <div class="sumario__container">
        <div class="sumario-resultado__container">
          <h2 class="resultado">Seu Resultado</h2>

          <div class="pontuacao-circulo">
            <div class="pontuacao">76</div>
            <p class="proporcionalidade">de 100</p>
          </div>

          <p class="classificacao">Ótimo</p>
          <p class="descricao">
            Você obteve uma pontuação superior a 65% das pessoas que fizeram
            este teste.
          </p>
        </div>

        <div class="sumario-resumo__container">
          <h1 class="resumo-titulo">Sumário</h1>

          <div class="status-item reacao">
            <div class="status-item__esquerdo">
              <img
              src="./assets/images/icon-reaction.svg"
              alt="icone de reação"
            />
            <p>Reação</p>
            </div>
            <div class="status-item__direito">
              <p class="nota">80</p></span class="proporcionalidade">/ 100</span>
            </div>
          </div>

          <div class="status-item memoria">
            <div class="status-item__esquerdo">
              <img
              src="./assets/images/icon-memory.svg"
              alt="icone de memória"
            />
            <p>Memória</p>
            </div>
            <div class="status-item__direito">
              <p class="nota">92</p></span>/ 100</span>
            </div>
          </div>

          <div class="status-item verbal">
            <div class="status-item__esquerdo">
              <img
              src="./assets/images/icon-verbal.svg"
              alt="icone de verbal"
            />
            <p>Verbal</p>
            </div>
            <div class="status-item__direito">
              <p class="nota">61</p></span>/ 100</span>
            </div>
          </div>

          <div class="status-item visual">
            <div class="status-item__esquerdo">
              <img
              src="./assets/images/icon-visual.svg"
              alt="icone de visual"
            />
            <p>Visual</p>
            </div>
            <div class="status-item__direito">
              <p class="nota">73</p></span>/ 100</span>
            </div>
          </div>

          <button class="btn-continuar">Continue</button>
          
        </div>
      </div>

    </main>

    </div> -->
  </body>
</html>
