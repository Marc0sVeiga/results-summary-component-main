<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <div class="sumario-resultado__container">
        <div class="resultado">Seu Resultado</div>
        <div class="pontuacao">76</div>
        <div class="proporcionalidade">de 100</div>
        <h1>Great</h1>
        <p>
          Você obteve uma pontuação superior a 65% das pessoas que fizeram este
          teste.
        </p>
      </div>

      <div class="sumario-resumo__container">
        <div class="resumo">Resumo</div>
        <div class="reacao">
          <p>Reação</p>
          <span>80</span>
        </div>
        <div class="memoria">
          <p>Memória</p>
          <span>92</span>
        </div>
        <div class="verbal">
          <p>Verbal</p>
          <span>61</span>
        </div>
        <div class="visual">
          <p>Visual</p>
          <span>72</span>
        </div>

        <button class="continuar">Continue</button>
      </div>
    </main>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
