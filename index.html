<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <div class="sumario-resultado__container">
        <h2 class="resultado">Seu Resultado</h2>
        <div class="pontuacao">76</div>
        <p class="proporcionalidade">de 100</p>
        <p class="classificacao">Great</p>
        <p class="descricao">
          Você obteve uma pontuação superior a 65% das pessoas que fizeram este
          teste.
        </p>
      </div>

      <div class="sumario-resumo__container">
        <h1 class="resumo">Summary</h1>
        <div class="reacao">
          <p>Reação</p>
          <span>80 / 100</span>
        </div>
        <div class="memoria">
          <p>Memória</p>
          <span>92 / 100</span>
        </div>
        <div class="verbal">
          <p>Verbal</p>
          <span>61 / 100</span>
        </div>
        <div class="visual">
          <p>Visual</p>
          <span>72 / 100</span>
        </div>

        <button class="continuar">Continue</button>
      </div>
    </main>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
